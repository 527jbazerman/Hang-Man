<!doctype html>
<html lang="en">

<head>
    <title>Elite Hangman</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body onload="startGame()">

    <header></header>

    <main>

        <div id="game" class="container text-center mt-5">

            <h1>Elite Hangman</h1>

            <!-- DIFFICULTY BUTTONS -->
            <div class="mb-4">

                <strong>Select Difficulty:</strong><br><br>

                <button onclick="setDifficulty('easy')" class="btn btn-success">Easy</button>
                <button onclick="setDifficulty('medium')" class="btn btn-warning">Medium</button>
                <button onclick="setDifficulty('hard')" class="btn btn-danger">Hard</button>

            </div>

            <!-- WORD DISPLAY -->
            <div id="wordDisplay">
                _ _ _ _ _
            </div>

            <!-- HEALTH BAR (AI assisted feature) -->
            <div id="healthContainer">
                <div id="healthBar"></div>
            </div>

            <!-- INPUT -->
            <div class="mt-3">
                <input type="text" id="letterInput" maxlength="1" placeholder="A" />
                <button onclick="guessLetter()" class="btn btn-primary">Guess</button>
            </div>

            <!-- GUESSED LETTERS -->
            <div class="mt-3">
                <strong>Guessed Letters:</strong>
                <span id="guessedLetters"></span>
            </div>

            <!-- GUESSES LEFT -->
            <div class="mt-2">
                <strong>Guesses Left:</strong>
                <span id="guessesLeft"></span>
            </div>

            <!-- MESSAGE -->
            <div id="message" class="mt-3"></div>

            <!-- RESTART BUTTON -->
            <div class="mt-4">
                <button onclick="restartGame()" class="btn btn-danger">Restart Game</button>
            </div>

        </div>

    </main>

    <footer></footer>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>

</body>

</html>
